<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    overflow:hidden;
}

/* شاشة الشات */
#chat{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:20px;
    background:#0b141a;
}

.msg{
    background:#202c33;
    padding:10px 15px;
    margin:5px 0;
    border-radius:10px;
    width:fit-content;
    max-width:70%;
    animation:fade 0.5s;
}

.me{
    background:#005c4b;
    align-self:flex-end;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1;}
}

/* الصفحة الرومانسية */
#main{
    display:none;
    height:100vh;
    overflow:auto;
    text-align:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    padding:30px;
}

/* قلوب */
.heart{
    position:fixed;
    color:red;
    animation:float 5s linear infinite;
}
@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}

/* زر */
button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff3b5c;
    color:white;
    font-size:18px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- 💬 الشات -->
<div id="chat"></div>

<!-- 💖 الصفحة -->
<div id="main">

    <h1>أنا آسف ❤️</h1>

    <p id="text"></p>

    <h2>فاكرة كل حاجة؟ 💭</h2>
    <p>
        فاكر ضحكتك… فاكر كلامنا… فاكر كل تفصيلة صغيرة ❤️  
        مش قادر أنسى ولا عايز أنسى
    </p>

    <h2>بقالنا قد إيه ⏳</h2>
    <p id="timer"></p>

    <button onclick="love()">سامحيني؟ 🥺</button>

</div>

<!-- 🎵 الأغنية -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/4Y1d5n6zj9g?autoplay=1&loop=1&playlist=4Y1d5n6zj9g"
allow="autoplay">
</iframe>

<script>

/* 💬 الشات */
const messages = [
    "ممكن أقولك حاجة؟",
    "أنا زعلان من نفسي بجد...",
    "مش عايز أخسرك 💔",
    "عملت حاجة ليكي...",
    "افتحيها ❤️"
];

let i=0;
function sendMsg(){
    if(i < messages.length){
        let div=document.createElement("div");
        div.className="msg " + (i%2?"me":"");
        div.innerText=messages[i];
        document.getElementById("chat").appendChild(div);
        i++;
        setTimeout(sendMsg,1500);
    }else{
        setTimeout(showMain,1500);
    }
}
sendMsg();

/* 💖 تحويل للصفحة */
function showMain(){
    document.getElementById("chat").style.display="none";
    document.getElementById("main").style.display="block";
    type();
}

/* ✍️ كتابة */
const msg="عارف إني غلطت... بس والله بحبك جدًا ومش قادر أخسرك ❤️ وجودك في حياتي هو أحلى حاجة حصلتلي 🥺";
let x=0;
function type(){
    if(x < msg.length){
        document.getElementById("text").innerHTML += msg[x];
        x++;
        setTimeout(type,50);
    }
}

/* ⏳ عداد */
const start=new Date("2024-01-01");
setInterval(()=>{
    let now=new Date();
    let d=Math.floor((now-start)/(1000*60*60*24));
    document.getElementById("timer").innerHTML=d+" يوم ❤️";
},1000);

/* 💓 قلوب */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},300);

/* زر */
function love(){
    alert("كنت عارف إنك هتسامحيني ❤️");
}

</script>

</body>
</html>
