<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* صفحة الباسورد */
#login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

input {
    padding: 15px;
    border-radius: 10px;
    border: none;
    text-align: center;
    font-size: 18px;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: #ff3b5c;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* الصفحة التانية */
#main {
    display: none;
    padding: 30px;
}

.section {
    margin: 60px 0;
}

/* قلوب */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- 🔒 صفحة الباسورد -->
<div id="login">
    <h1>ادخلي كلمة السر ❤️</h1>
    <input type="password" id="pass" placeholder="كلمة السر">
    <button onclick="checkPass()">دخول</button>
</div>

<!-- 💖 الصفحة الرئيسية -->
<div id="main">

    <h1>أنا آسف ❤️</h1>

    <div class="section">
        <p id="text"></p>
    </div>

    <div class="section">
        <h2>فاكرة؟ 💭</h2>
        <p>
            فاكر أول مرة اتكلمنا؟  
            فاكر ضحكتك؟  
            فاكر كل التفاصيل الصغيرة اللي كانت بتفرحني؟  
            كل ده مش قادر أنساه... ومش عايز أنساه ❤️
        </p>
    </div>

    <div class="section">
        <h2>بقالنا قد إيه؟ ⏳</h2>
        <p id="timer"></p>
    </div>

    <div class="section">
        <h2>آخر حاجة 💔➡️❤️</h2>
        <p>
            أنا مش perfect... بس بحبك بجد  
            ويمكن غلطت، بس عمري ما هختار أزعلك  
            سامحيني ونبدأ من جديد؟ 🥺
        </p>
        <button onclick="love()">سامحيني؟ ❤️</button>
    </div>

</div>

<!-- 🎵 الأغنية -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/4Y1d5n6zj9g?autoplay=1&loop=1&playlist=4Y1d5n6zj9g"
allow="autoplay">
</iframe>

<script>
// 🔒 باسورد
function checkPass() {
    const pass = document.getElementById("pass").value;
    if(pass === "love"){
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";
    } else {
        alert("غلط 😅");
    }
}

// ✍️ كتابة تدريجية
const msg = "عارف إني غلطت... بس والله بحبك جدًا ومش قادر أخسرك ❤️ كل حاجة ليها معنى بيكي... وجودك في حياتي هو أحلى حاجة حصلتلي 🥺";
let i=0;
function type(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type,50);
    }
}

// ⏳ عداد
const startDate = new Date("2024-01-01");
function timer(){
    const now = new Date();
    const diff = now - startDate;
    const days = Math.floor(diff/(1000*60*60*24));
    document.getElementById("timer").innerHTML = days + " يوم ❤️";
}
setInterval(timer,1000);

// 💓 قلوب
function heart(){
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}
setInterval(heart,300);

// زرار
function love(){
    alert("كنت عارف إنك هتسامحيني ❤️");
}

// يبدأ الكتابة بعد الدخول
setInterval(()=>{
    if(document.getElementById("main").style.display==="block"){
        type();
    }
},1000);
</script>

</body>
</html>
