<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة ليكي ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 30px;
}

h1 {
    font-size: 42px;
}

#text {
    font-size: 20px;
    width: 80%;
    margin: 20px auto;
    min-height: 100px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff3b5c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background: #ff1f44;
}

/* قلوب */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% {transform: translateY(100vh); opacity:1;}
    100% {transform: translateY(-10vh); opacity:0;}
}

/* الصور */
.gallery img {
    width: 150px;
    border-radius: 15px;
    margin: 10px;
}

/* عداد */
#timer {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
    <h1>أنا آسف ❤️</h1>

    <div id="text"></div>

    <div id="timer"></div>

    <div class="gallery">
        <!-- حط صوركم هنا -->
        <!-- <img src="link"> -->
    </div>

    <button onclick="love()">سامحيني؟ 🥺</button>
</div>

<!-- أغنية عمرو دياب -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/4Y1d5n6zj9g?autoplay=1&loop=1&playlist=4Y1d5n6zj9g"
allow="autoplay">
</iframe>

<script>
// ✍️ كتابة تدريجية
const message = "عارف إني غلطت وحقك تزعل مني... بس والله انتي أغلى حاجة في حياتي ❤️ ومش قادر أخسرك 💔 كل لحظة بينا كانت بالدنيا كلها... سامحيني ونبدأ من جديد؟ 🥺";
let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}
typeWriter();

// 💖 قلوب
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (Math.random()*20+10)+"px";
    heart.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove()},5000);
}
setInterval(createHeart, 300);

// ⏳ عداد حب (غير التاريخ ده)
const startDate = new Date("2024-01-01");
function updateTimer() {
    const now = new Date();
    const diff = now - startDate;
    const days = Math.floor(diff/(1000*60*60*24));
    document.getElementById("timer").innerHTML = "بقالنا " + days + " يوم سوا ❤️";
}
setInterval(updateTimer,1000);

// 🎯 زرار
function love() {
    alert("كنت عارف إن قلبك كبير ❤️");
}
</script>

</body>
</html>
